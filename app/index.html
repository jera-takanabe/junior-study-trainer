    function loadAllQuestionSetHistories() {
      const prefix = `${HISTORY_KEY_BASE}__`;
      const histories = {};

      try {
        for (let i = 0; i < localStorage.length; i += 1) {
          const key = localStorage.key(i);
          if (!key || !key.startsWith(prefix)) continue;

          const questionSetId = key.slice(prefix.length);

          try {
            const sessions = JSON.parse(localStorage.getItem(key)) || [];
            histories[questionSetId] = Array.isArray(sessions) ? sessions : [];
          } catch (e) {
            histories[questionSetId] = [];
          }
        }
      } catch (e) {
        return {};
      }

      return histories;
    }

    function buildMasteryQuestionRefKey(questionSetId, questionId) {
      if (!questionSetId || !questionId) return "";
      return `${questionSetId}::${questionId}`;
    }

    function parseMasteryDate(value) {
      if (!value) return null;
      const date = new Date(value);
      return Number.isFinite(date.getTime()) ? date : null;
    }

    function getLaterIsoDate(firstValue, secondValue) {
      const firstDate = parseMasteryDate(firstValue);
      const secondDate = parseMasteryDate(secondValue);

      if (!firstDate) return secondDate ? secondDate.toISOString() : "";
      if (!secondDate) return firstDate.toISOString();

      return firstDate.getTime() >= secondDate.getTime()
        ? firstDate.toISOString()
        : secondDate.toISOString();
    }

    function getIntervalDays(fromValue, toValue) {
      const fromDate = parseMasteryDate(fromValue);
      const toDate = parseMasteryDate(toValue);
      if (!fromDate || !toDate) return null;

      const milliseconds = toDate.getTime() - fromDate.getTime();
      if (milliseconds < 0) return null;

      return milliseconds / (24 * 60 * 60 * 1000);
    }

    function addDaysToIsoDate(value, days) {
      const date = parseMasteryDate(value);
      if (!date || !Number.isFinite(Number(days))) return "";

      return new Date(
        date.getTime() + Number(days) * 24 * 60 * 60 * 1000
      ).toISOString();
    }

    function createDefaultMasteryState(questionSetId, questionId) {
      const questionRefKey = buildMasteryQuestionRefKey(questionSetId, questionId);

      return {
        questionRefKey,
        questionSetId: questionSetId || "",
        questionId: questionId || "",
        currentStabilityLevel: 0,
        highestStabilityLevel: 0,
        lastConfirmedAt: "",
        lastSuccessfulIntervalDays: null,
        lastAnsweredAt: "",
        lastWrongAt: "",
        lastFailureAt: "",
        lastCorrectAt: "",
        nextReviewAt: "",
        algorithmId: MASTERY_ALGORITHM_ID,
        algorithmVersion: MASTERY_ALGORITHM_VERSION,
        evaluatedAt: ""
      };
    }

    function getMasteryEventIsoDate(event) {
      const candidates = [
        event?.judgedAt,
        event?.sessionFinishedAt,
        event?.sessionStartedAt
      ];

      for (const value of candidates) {
        const date = parseMasteryDate(value);
        if (date) return date.toISOString();
      }

      return "";
    }

    function isSameMasteryDate(firstValue, secondValue) {
      const firstDate = parseMasteryDate(firstValue);
      const secondDate = parseMasteryDate(secondValue);
      if (!firstDate || !secondDate) return false;

      return firstDate.getFullYear() === secondDate.getFullYear()
        && firstDate.getMonth() === secondDate.getMonth()
        && firstDate.getDate() === secondDate.getDate();
    }

    function calculateMasteryNextReviewAt(state) {
      const level = Math.max(
        0,
        Math.min(
          MASTERY_INTERVAL_DAYS.length - 1,
          Number(state?.currentStabilityLevel) || 0
        )
      );

      if (level === 0) {
        return state?.lastFailureAt
          ? addDaysToIsoDate(state.lastFailureAt, 1)
          : "";
      }

      const intervalStartAt = getLaterIsoDate(
        state?.lastConfirmedAt,
        state?.lastFailureAt
      );

      if (!intervalStartAt) return "";

      return addDaysToIsoDate(
        intervalStartAt,
        MASTERY_INTERVAL_DAYS[level]
      );
    }

    function calculateMasteryReviewEvaluation(state, evaluatedAt = new Date().toISOString()) {
      const level = Number(state?.currentStabilityLevel) || 0;
      const originAt = getLaterIsoDate(
        state?.lastConfirmedAt,
        state?.lastFailureAt
      );
      const evaluationDate = parseMasteryDate(evaluatedAt);

      if (level === 0) {
        return {
          elapsedDays: originAt && evaluationDate
            ? Math.max(0, getIntervalDays(originAt, evaluatedAt))
            : null,
          forgettingRisk: null,
          reviewStatus: "要確認"
        };
      }

      if (!originAt || !evaluationDate) {
        return {
          elapsedDays: null,
          forgettingRisk: null,
          reviewStatus: "未確認"
        };
      }

      const elapsedDays = Math.max(
        0,
        getIntervalDays(originAt, evaluatedAt)
      );
      const intervalDays = MASTERY_INTERVAL_DAYS[level];

      if (!Number.isFinite(intervalDays) || intervalDays <= 0) {
        return {
          elapsedDays,
          forgettingRisk: null,
          reviewStatus: "未確認"
        };
      }

      const forgettingRisk = elapsedDays / intervalDays;
      let reviewStatus = "安定";

      if (forgettingRisk >= 1.5) {
        reviewStatus = "要確認";
      } else if (forgettingRisk >= 1.0) {
        reviewStatus = "復習推奨";
      } else if (forgettingRisk >= 0.75) {
        reviewStatus = "まもなく確認";
      }

      return {
        elapsedDays,
        forgettingRisk,
        reviewStatus
      };
    }

    function applyAnswerEventToMasteryState(currentState, event) {
      const questionSetId = event?.questionSetId || "";
      const questionId = event?.questionId || "";
      const questionRefKey = buildMasteryQuestionRefKey(questionSetId, questionId);
      const eventAt = getMasteryEventIsoDate(event);
      const judgement = event?.judgement || "";

      if (
        !questionRefKey
        || !eventAt
        || !["correct", "wrong", "pass"].includes(judgement)
      ) {
        return currentState;
      }

      const state = {
        ...createDefaultMasteryState(questionSetId, questionId),
        ...(currentState || {}),
        questionRefKey,
        questionSetId,
        questionId
      };

      const levelBefore = Math.max(
        0,
        Math.min(
          MASTERY_INTERVAL_DAYS.length - 1,
          Number(state.currentStabilityLevel) || 0
        )
      );

      state.currentStabilityLevel = levelBefore;
      state.lastAnsweredAt = eventAt;

      if (judgement === "wrong") {
        state.currentStabilityLevel = Math.max(0, levelBefore - 2);
        state.lastWrongAt = eventAt;
        state.lastFailureAt = eventAt;
      } else if (judgement === "pass") {
        state.currentStabilityLevel = Math.max(0, levelBefore - 1);
        state.lastFailureAt = eventAt;
      } else if (judgement === "correct") {
        state.lastCorrectAt = eventAt;

        const intervalStartAt = getLaterIsoDate(
          state.lastConfirmedAt,
          state.lastFailureAt
        );
        const intervalDays = getIntervalDays(intervalStartAt, eventAt);
        const sameDayFailure = state.lastFailureAt
          && isSameMasteryDate(state.lastFailureAt, eventAt);

        let meaningfulCorrect = false;

        if (levelBefore === 0) {
          const firstRecordedCorrect = !state.lastConfirmedAt && !state.lastFailureAt;
          const recoveredAfterFailure = state.lastFailureAt
            && intervalDays !== null
            && intervalDays >= 1;

          if (!sameDayFailure && (firstRecordedCorrect || recoveredAfterFailure)) {
            state.currentStabilityLevel = 1;
            meaningfulCorrect = true;
          }
        } else {
          const requiredIntervalDays = MASTERY_INTERVAL_DAYS[levelBefore];

          if (
            !sameDayFailure
            && intervalDays !== null
            && intervalDays >= requiredIntervalDays
          ) {
            if (levelBefore < MASTERY_INTERVAL_DAYS.length - 1) {
              state.currentStabilityLevel = levelBefore + 1;
            }
            meaningfulCorrect = true;
          }
        }

        if (meaningfulCorrect) {
          state.lastSuccessfulIntervalDays = intervalDays;
          state.lastConfirmedAt = eventAt;
        }
      }

      state.highestStabilityLevel = Math.max(
        Number(state.highestStabilityLevel) || 0,
        state.currentStabilityLevel
      );
      state.nextReviewAt = calculateMasteryNextReviewAt(state);
      state.algorithmId = MASTERY_ALGORITHM_ID;
      state.algorithmVersion = MASTERY_ALGORITHM_VERSION;
      state.evaluatedAt = eventAt;

      return state;
    }

    function recalculateAllMasteryStates(answerEvents = null) {
      const events = Array.isArray(answerEvents)
        ? [...answerEvents]
        : collectAllAnswerEvents();

      const sortableEvents = events
        .map((event, originalIndex) => ({
          event,
          originalIndex,
          eventAt: getMasteryEventIsoDate(event)
        }))
        .filter(item =>
          item.eventAt
          && item.event?.questionSetId
          && item.event?.questionId
          && ["correct", "wrong", "pass"].includes(item.event?.judgement)
        )
        .sort((a, b) => {
          const timeDifference =
            parseMasteryDate(a.eventAt).getTime()
            - parseMasteryDate(b.eventAt).getTime();

          if (timeDifference !== 0) return timeDifference;
          return a.originalIndex - b.originalIndex;
        });

      const masteryMap = {};

      sortableEvents.forEach(({ event }) => {
        const questionRefKey = buildMasteryQuestionRefKey(
          event.questionSetId,
          event.questionId
        );

        if (!questionRefKey) return;

        masteryMap[questionRefKey] = applyAnswerEventToMasteryState(
          masteryMap[questionRefKey],
          event
        );
      });

      return masteryMap;
    }

    function loadMasteryStates() {
      try {
        const value = JSON.parse(localStorage.getItem(MASTERY_KEY)) || {};
        return value && typeof value === "object" && !Array.isArray(value)
          ? value
          : {};
      } catch (e) {
        return {};
      }
    }

    function saveMasteryStates(masteryMap) {
      const value = masteryMap && typeof masteryMap === "object" && !Array.isArray(masteryMap)
        ? masteryMap
        : {};

      localStorage.setItem(MASTERY_KEY, JSON.stringify(value));
      return value;
    }

    function rebuildAndSaveAllMasteryStates() {
      const masteryMap = recalculateAllMasteryStates();
      saveMasteryStates(masteryMap);
      return masteryMap;
    }

    function collectAllAnswerEvents() {
      const events = [];

      const appendSession = (session, fallbackQuestionSetId = "", fallbackPurposeSetId = "") => {
        const runtime = session?.runtimeContext || {};
        const settingsValue = session?.settings || {};
        const resultsValue = Array.isArray(session?.results) ? session.results : [];

        resultsValue.forEach(result => {
          const runtimeMode = runtime.mode || "questionSet";
          const purposeSetId = runtimeMode === "purposeSet" || runtimeMode === "purposeCycle"
            ? runtime.id || fallbackPurposeSetId
            : "";

          events.push({
            sessionId: session?.id || "",
            sessionStartedAt: session?.startedAt || "",
            sessionFinishedAt: session?.finishedAt || "",
            runtimeMode,
            quizMode: settingsValue.mode || "",
            purposeSetId,
            cycleId: runtime.cycleId || "",
            questionSetId: result?.questionSetId || fallbackQuestionSetId,
            questionId: result?.questionId || "",
            setId: result?.setId || "",
            setName: result?.setName || "",
            domain: result?.domain || "",
            exam: result?.exam || "",
            category: result?.category || "",
            level: result?.level || "",
            unit: result?.unit || "",
            questionType: result?.questionType || "",
            question: result?.question || "",
            answer: result?.answer || "",
            judgement: result?.judgement || "",
            judgedAt: result?.judgedAt || "",
            answerTrigger: result?.answerTrigger || "",
            questionTimeLimitSec: settingsValue.questionTimeSec ?? "",
            questionTimeActualSec: Number.isFinite(Number(result?.questionTimeMs))
              ? Number((Number(result.questionTimeMs) / 1000).toFixed(1))
              : null,
            interrupted: session?.interrupted === true
          });
        });
      };

      const questionSetHistories = loadAllQuestionSetHistories();
      Object.entries(questionSetHistories).forEach(([questionSetId, sessions]) => {
        (Array.isArray(sessions) ? sessions : []).forEach(session => {
          appendSession(session, questionSetId, "");
        });
      });

      const purposeHistories = loadAllPurposeHistories();
      Object.entries(purposeHistories).forEach(([purposeSetId, sessions]) => {
        (Array.isArray(sessions) ? sessions : []).forEach(session => {
          appendSession(session, "", purposeSetId);
        });
      });

      return events;
    }

    function exportAnswerEventsCsv() {
      const events = collectAllAnswerEvents();

      if (events.length === 0) {
        alert("出力できる回答イベントがありません。");
        return;
      }

      const rows = [[
        "session_id",
        "session_started_at",
        "session_finished_at",
        "runtime_mode",
        "quiz_mode",
        "purpose_set_id",
        "cycle_id",
        "question_set_id",
        "question_id",
        "set_id",
        "set_name",
        "domain",
        "exam",
        "category",
        "level",
        "unit",
        "question_type",
        "question",
        "answer",
        "judgement",
        "judged_at",
        "answer_trigger",
        "question_time_limit_sec",
        "question_time_actual_sec",
        "interrupted"
      ]];

      events.forEach(event => {
        rows.push([
          event.sessionId,
          event.sessionStartedAt,
          event.sessionFinishedAt,
          event.runtimeMode,
          event.quizMode,
          event.purposeSetId,
          event.cycleId,
          event.questionSetId,
          event.questionId,
          event.setId,
          event.setName,
          event.domain,
          event.exam,
          event.category,
          event.level,
          event.unit,
          event.questionType,
          event.question,
          event.answer,
          event.judgement,
          event.judgedAt,
          event.answerTrigger,
          event.questionTimeLimitSec,
          event.questionTimeActualSec ?? "",
          event.interrupted ? "true" : "false"
        ]);
      });

      downloadCsv(
        rows,
        `timed_quiz_answer_events_${formatDateForFile(new Date())}.csv`
      );
    }

    function exportHistoryCsv() {
      const history = loadHistory();
      if (history.length === 0) {
        alert("出力できる履歴がありません。");
        return;
      }

      const rows = [[
        "session_id", "finished_at", "set_id_setting", "set_name_setting", "category_setting", "level_setting", "mode_setting",
        "question_time_sec", "question_id", "set_id", "set_name", "domain", "exam", "category",
        "level", "unit", "question_type", "question", "answer", "judgement", "answer_trigger",
        "question_time_sec_actual", "mistake_points_after", "progress_status_after", "mastery_status_after"
      ]];

      history.forEach(session => {
        session.results.forEach(r => {
          rows.push([
            session.id, session.finishedAt, session.settings.setId || "all", session.settings.setName || "全部", session.settings.category, session.settings.level || "all", session.settings.mode || "all",
            session.settings.questionTimeSec, r.questionId, r.setId || "", r.setName || "", r.domain || "", r.exam || "", r.category,
            r.level, r.unit || "", r.questionType || "", r.question, r.answer, r.judgement, r.answerTrigger,
            (r.questionTimeMs / 1000).toFixed(1), r.mistakePointsAfter ?? "", r.progressStatusAfter ?? "", r.masteryStatusAfter ?? ""
          ]);
        });
      });

      downloadCsv(rows, `timed_quiz_history_${formatDateForFile(new Date())}.csv`);
    }

    function exportProgressCsv() {
      const rows = [[
        "question_id", "set_id", "set_name", "domain", "exam", "category", "level", "unit", "question_type", "question", "answer",
        "seen_count", "correct_count", "wrong_count", "pass_count", "consecutive_correct",
        "mistake_points", "progress_status", "last_judgement", "last_answered_at", "mastery_status", "tags", "targets"
      ]];

      QUESTIONS.forEach(q => {
        const p = getQuestionProgress(q.id);
        rows.push([
          q.id, q.setId || "unset", q.setName || "未設定セット", q.domain || "", q.exam || "", q.category || "", q.level || "", q.unit || "", q.questionType || "",
          q.question, q.answer, p.seenCount, p.correctCount, p.wrongCount, p.passCount, p.consecutiveCorrect,
          p.mistakePoints, p.progressStatus, p.lastJudgement, p.lastAnsweredAt, p.masteryStatus,
          Array.isArray(q.tags) ? q.tags.join("|") : "",
          Array.isArray(q.targets) ? q.targets.join("|") : ""
        ]);
      });

      downloadCsv(rows, `timed_quiz_progress_${formatDateForFile(new Date())}.csv`);
    }

    function downloadCsv(rows, filename) {
      const csv = rows.map(row => row.map(csvEscape).join(",")).join("\n");
      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // =====================================================
    // 共通ユーティリティ
    // =====================================================

    function showScreen(name) {
      setupScreen.classList.add("hidden");
      quizScreen.classList.add("hidden");
      resultScreen.classList.add("hidden");
      historyScreen.classList.add("hidden");
      progressListScreen.classList.add("hidden");
      masteryListScreen.classList.add("hidden");
      if (name === "setup") setupScreen.classList.remove("hidden");
      if (name === "quiz") quizScreen.classList.remove("hidden");
      if (name === "result") resultScreen.classList.remove("hidden");
      if (name === "history") historyScreen.classList.remove("hidden");
      if (name === "progressList") progressListScreen.classList.remove("hidden");
      if (name === "masteryList") masteryListScreen.classList.remove("hidden");
    }

    function clearTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function shuffleArray(array) {
      const copied = [...array];
      for (let i = copied.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function getQuestionById(questionId) {
      return QUESTIONS.find(q => q.id === questionId);
    }

    function labelJudgement(judgement) {
      if (judgement === "correct") return "正解";
      if (judgement === "wrong") return "不正解";
      if (judgement === "pass") return "パス";
      return judgement;
    }

    function labelTrigger(trigger) {
      if (trigger === "manual") return "手動";
      if (trigger === "timeout") return "時間切れ";
      return trigger || "不明";
    }

    function labelMode(mode) {
      if (mode === "all") return "全部から出題";
      if (mode === "new") return "未着手だけ";
      if (mode === "not_mastered") return "習得済みを除く";
      if (mode === "review_points") return "復習ポイントあり";
      if (mode === "wrong_before") return "過去に不正解あり";
      if (mode === "mastery_review") return "弱点練習";
      if (mode === "mastery_check") return "定着確認";
      return mode || "全部から出題";
    }

    function labelProgressStatus(status) {
      if (status === "new") return "未着手";
      if (status === "started") return "着手済み";
      if (status === "mastered") return "習得済み";
      return status;
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return `"${text.replaceAll('"', '""')}"`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDateForFile(date) {
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const mi = String(date.getMinutes()).padStart(2, "0");
      return `${yyyy}${mm}${dd}_${hh}${mi}`;
    }
  </script>
