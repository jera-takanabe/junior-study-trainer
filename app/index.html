<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タイムアタック一問一答 v0.6</title>
  <!--
    questions.js を同じフォルダに置いてください。

    v0.6 追加点：
    - 問題セット切替
    - window.QUIZ_SETS manifest 対応
    - setId / setName 自動抽出
    - JSONバックアップに sets を含める
    - CSVに set_id / set_name を含める

    推奨 questions.js 形式：

    window.QUIZ_SETS = [
      {
        setId: "s001",
        setName: "基本熟語・日常語 01",
        seriesName: "基本熟語・日常語",
        order: 1,
        description: "最初に扱う基本熟語・日常語セット"
      }
    ];

    window.QUIZ_QUESTIONS = [
      {
        id: "kanken5-s001-read-001",
        setId: "s001",
        setName: "基本熟語・日常語 01",
        domain: "kanken",
        exam: "漢検5級",
        category: "漢検5級・移動用",
        level: "読み",
        unit: "小6漢字",
        questionType: "read",
        question: "次の漢字の読みは？\n\n『承認』",
        answer: "しょうにん",
        note: "意味：よいと認めること。",
        tags: ["漢検5級", "Set001", "読み"],
        targets: ["承", "認", "承認"]
      }
    ];
  -->
  <script src="question_sets_manifest.js"></script>
  <script src="purpose_sets_manifest.js"></script>
  <script src="purpose_sets.js"></script>
  <script src="questions.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section id="setupScreen" class="card">
      <h1>タイムアタック一問一答 v0.6</h1>
      <p class="muted">
        v0.5の保存・復元機能に加えて、問題セットを画面上で切り替えられます。
      </p>

      <div id="storageStatus" class="status-panel">保存状態を確認中...</div>
      <div id="questionSetProfile" class="status-panel" style="margin-top: 8px;">教材情報を確認中...</div>
      <div id="questionSetsManifestPanel" class="status-panel" style="margin-top: 8px;">教材一覧を確認中...</div>
      <div id="purposeSetsPanel" class="status-panel" style="margin-top: 8px;">目的別問題集を確認中...</div>

      <div class="form-grid" style="margin-top: 16px;">
        <div>
          <label for="setSelect">セット</label>
          <select id="setSelect"></select>
        </div>

        <div>
          <label for="categorySelect">カテゴリ</label>
          <select id="categorySelect"></select>
        </div>

        <div>
          <label for="levelSelect">出題タイプ</label>
          <select id="levelSelect"></select>
        </div>

        <div>
          <label for="modeSelect">出題モード</label>
          <select id="modeSelect">
            <option value="all" selected>全部から出題</option>
            <option value="new">未着手だけ</option>
            <option value="not_mastered">習得済みを除く</option>
            <option value="review_points">復習ポイントあり</option>
            <option value="wrong_before">過去に不正解あり</option>
            <option value="mastery_review">弱点練習</option>
            <option value="mastery_check">定着確認</option>
          </select>
        </div>

        <div>
          <label for="questionCountSelect">問題数</label>
          <select id="questionCountSelect">
            <option value="5">5問</option>
            <option value="10" selected>10問</option>
            <option value="20">20問</option>
            <option value="30">30問</option>
            <option value="all">全問</option>
          </select>
        </div>

        <div>
          <label for="questionTimeSelect">問題表示時間</label>
          <select id="questionTimeSelect">
            <option value="10">10秒</option>
            <option value="15" selected>15秒</option>
            <option value="20">20秒</option>
            <option value="30">30秒</option>
            <option value="60">60秒</option>
          </select>
        </div>

        <div>
          <label for="orderSelect">出題順</label>
          <select id="orderSelect">
            <option value="random" selected>ランダム</option>
            <option value="normal">登録順</option>
          </select>
        </div>
      </div>

      <div id="progressSummary" class="summary-grid wide"></div>
      <p id="questionCountInfo" class="muted small"></p>

      <div class="btn-row">
        <button class="btn-primary" onclick="startQuiz()">スタート</button>
      </div>

      <h3 style="margin-top: 20px;">保存・バックアップ</h3>
      <div class="top-actions">
        <button class="btn-secondary" onclick="checkStorageStatus()">保存確認</button>
        <button class="btn-secondary" onclick="exportBackupJson()">バックアップJSON出力</button>
        <button class="btn-secondary" onclick="document.getElementById('backupFileInput').click()">バックアップJSON読込</button>
        <input id="backupFileInput" type="file" accept="application/json,.json" class="hidden" onchange="importBackupJson(event)" />
      </div>

      <h3 style="margin-top: 20px;">確認・管理</h3>
      <div class="top-actions">
        <button class="btn-secondary" onclick="showHistory()">履歴を見る</button>
        <button class="btn-secondary" onclick="showPurposeHistory()">目的別履歴を見る</button>
        <button class="btn-secondary" onclick="showPurposeCycles()">周回状況を見る</button>
        <button class="btn-secondary" onclick="showProgressList()">問題別進捗を見る</button>
        <button class="btn-secondary" onclick="showMasteryList()">定着・復習状況を見る</button>
        <button class="btn-secondary" onclick="exportHistoryCsv()">履歴CSV</button>
        <button class="btn-secondary" onclick="exportProgressCsv()">進捗CSV</button>
        <button class="btn-secondary" onclick="exportAnswerEventsCsv()">回答イベントCSV</button>
        <button class="btn-secondary" onclick="clearHistory()">履歴削除</button>
        <button class="btn-secondary" onclick="clearPurposeHistories()">目的別履歴リセット</button>
        <button class="btn-secondary" onclick="clearPurposeCycles()">周回リセット</button>
        <button class="btn-danger" onclick="clearProgress()">進捗リセット</button>
      </div>
    </section>

    <section id="quizScreen" class="card hidden">
      <div class="progress">
        <span id="progressText">第1問 / 10問</span>
        <span id="categoryText">カテゴリ</span>
      </div>

      <div id="timer" class="timer">15</div>

      <div id="questionArea">
        <div class="question" id="questionText"></div>
        <div class="btn-row two">
          <button class="btn-primary" onclick="showAnswer('manual')">回答を見る</button>
          <button class="btn-secondary" onclick="togglePause()" id="pauseButton">一時停止</button>
        </div>
      </div>

      <div id="answerArea" class="hidden">
        <h2>答え</h2>
        <div class="answer" id="answerText"></div>
        <div id="noteText" class="note hidden"></div>
        <p class="muted small">親が判定してください。間違いは「復習ポイント」として次につながります。</p>
        <div class="btn-row three">
          <button class="btn-success" onclick="judgeCurrent('correct')">正解</button>
          <button class="btn-danger" onclick="judgeCurrent('wrong')">不正解</button>
          <button class="btn-warning" onclick="judgeCurrent('pass')">パス</button>
        </div>
      </div>

      <div class="btn-row two">
        <button class="btn-secondary" onclick="finishQuiz(true)">途中終了</button>
      </div>
    </section>

    <section id="resultScreen" class="card hidden">
      <h2>結果</h2>
      <div id="resultRuntimeInfo" class="note hidden"></div>
      <div id="resultSummary" class="summary-grid"></div>
      <div id="reviewArea"></div>
      <div class="btn-row two">
        <button class="btn-primary" onclick="restartWithSameSettings()">同じ設定でもう一度</button>
        <button class="btn-secondary" onclick="backToSetup()">設定に戻る</button>
      </div>
      <div class="btn-row">
        <button id="retryWrongButton" class="btn-warning" onclick="retryWrongQuestions()">間違えた問題だけ再挑戦</button>
      </div>
    </section>

    <section id="historyScreen" class="card hidden">
      <h2>履歴</h2>
      <div id="historyArea"></div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="backToSetup()">設定に戻る</button>
      </div>
    </section>

    <section id="progressListScreen" class="card hidden">
      <h2>問題別進捗</h2>
      <p class="muted small">現在のセット・カテゴリ・出題タイプ条件で表示します。</p>
      <div id="progressListArea"></div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="backToSetup()">設定に戻る</button>
      </div>
    </section>

    <section id="masteryListScreen" class="card hidden">
      <h2>定着・復習状況</h2>
      <p class="muted small">回答履歴から算出した長期定着状態を表示します。</p>
      <div id="masteryListArea"></div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="backToSetup()">設定に戻る</button>
      </div>
    </section>
  </main>

  <script>
    const SAMPLE_QUESTIONS = [
      {
        id: "sample-k5-read-001",
        setId: "sample",
        setName: "サンプルセット",
        domain: "kanken",
        exam: "漢検5級",
        category: "漢検5級・移動用",
        level: "読み",
        unit: "小6漢字",
        questionType: "read",
        question: "次の漢字の読みは？\n\n『承認』",
        answer: "しょうにん",
        note: "questions.js が読み込まれていない場合のサンプル問題です。",
        tags: ["漢検5級", "読み"],
        targets: ["承", "認"]
      }
    ];

    let QUESTIONS = Array.isArray(window.QUIZ_QUESTIONS) && window.QUIZ_QUESTIONS.length > 0
      ? window.QUIZ_QUESTIONS
      : SAMPLE_QUESTIONS;

    let SETS = buildSetManifest();
    let QUESTION_SET_PROFILE = buildQuestionSetProfile();

    // 教材切り替えに備えて、進捗・履歴は教材IDごとの保存キーに分離します。
    const HISTORY_KEY_BASE = "timedQuizTrainerHistoryV04";
    const PROGRESS_KEY_BASE = "timedQuizTrainerProgressV04";
    const PURPOSE_HISTORY_KEY_BASE = "timedQuizTrainerPurposeHistoryV01";
    const PURPOSE_CYCLE_KEY_BASE = "timedQuizTrainerPurposeCycleV01";
    const MASTERY_KEY = "timedQuizTrainerMasteryV01";
    const MASTERY_ALGORITHM_ID = "interval_stability";
    const MASTERY_ALGORITHM_VERSION = 1;
    const MASTERY_INTERVAL_DAYS = [0, 1, 3, 7, 14, 30, 60, 120];
    let HISTORY_KEY = buildStorageKey(HISTORY_KEY_BASE);
    let PROGRESS_KEY = buildStorageKey(PROGRESS_KEY_BASE);
    const APP_VERSION = "v0.6";

    function buildStorageKey(baseKey) {
      return `${baseKey}__${QUESTION_SET_PROFILE.questionSetId || "unknown_question_set"}`;
    }

    function buildPurposeHistoryKey(purposeSetId) {
      return `${PURPOSE_HISTORY_KEY_BASE}__${purposeSetId || "unknown_purpose_set"}`;
    }

    function buildPurposeCycleKey(purposeSetId) {
      return `${PURPOSE_CYCLE_KEY_BASE}__${purposeSetId || "unknown_purpose_set"}`;
    }

    function rebuildStorageKeys() {
      HISTORY_KEY = buildStorageKey(HISTORY_KEY_BASE);
      PROGRESS_KEY = buildStorageKey(PROGRESS_KEY_BASE);

      return {
        historyKey: HISTORY_KEY,
        progressKey: PROGRESS_KEY
      };
    }

    let settings = null;
    let quizQuestions = [];
    let currentIndex = 0;
    let quizStartedAt = null;
    let currentQuestionStartedAt = null;
    let answerShownAt = null;
    let answerTrigger = null;
    let remainingSeconds = 0;
    let timerId = null;
    let isPaused = false;
    let pauseStartedAt = null;
    let totalPausedMs = 0;
    let results = [];
    let lastSession = null;
    let showUnavailablePurposeSets = false;
    let runtimeContext = {
      mode: "questionSet",
      id: "",
      title: "",
      saveProgress: true,
      saveHistory: true
    };

    const setupScreen = document.getElementById("setupScreen");
    const quizScreen = document.getElementById("quizScreen");
    const resultScreen = document.getElementById("resultScreen");
    const historyScreen = document.getElementById("historyScreen");
    const progressListScreen = document.getElementById("progressListScreen");
    const masteryListScreen = document.getElementById("masteryListScreen");

    const setSelect = document.getElementById("setSelect");
    const categorySelect = document.getElementById("categorySelect");
    const levelSelect = document.getElementById("levelSelect");
    const modeSelect = document.getElementById("modeSelect");
    const questionCountSelect = document.getElementById("questionCountSelect");
    const questionTimeSelect = document.getElementById("questionTimeSelect");
    const orderSelect = document.getElementById("orderSelect");
    const questionCountInfo = document.getElementById("questionCountInfo");
    const progressSummary = document.getElementById("progressSummary");
    const storageStatus = document.getElementById("storageStatus");
    const questionSetProfile = document.getElementById("questionSetProfile");
    const questionSetsManifestPanel = document.getElementById("questionSetsManifestPanel");
    const purposeSetsPanel = document.getElementById("purposeSetsPanel");

    const progressText = document.getElementById("progressText");
    const categoryText = document.getElementById("categoryText");
    const timerEl = document.getElementById("timer");
    const questionText = document.getElementById("questionText");
    const answerText = document.getElementById("answerText");
    const noteText = document.getElementById("noteText");
    const questionArea = document.getElementById("questionArea");
    const answerArea = document.getElementById("answerArea");
    const pauseButton = document.getElementById("pauseButton");
    const resultRuntimeInfo = document.getElementById("resultRuntimeInfo");
    const resultSummary = document.getElementById("resultSummary");
    const reviewArea = document.getElementById("reviewArea");
    const retryWrongButton = document.getElementById("retryWrongButton");
    const historyArea = document.getElementById("historyArea");
    const progressListArea = document.getElementById("progressListArea");
    const masteryListArea = document.getElementById("masteryListArea");

    startApplication();

    async function startApplication() {
      try {
        await loadSelectedQuestionSetData();
      } catch (error) {
        console.error(error);
        rebuildQuestionDataState();
      }

      rebuildStorageKeys();
      initialize();
    }

    function initialize() {
      validateQuestionIds();
      populateSets();
      populateCategories();
      populateLevels();
      refreshSetupSummary();
      renderQuestionSetProfile();
      renderQuestionSetsManifestPanel();
      renderPurposeSetsPanel();
      checkStorageStatus(false);
      rebuildAndSaveAllMasteryStates();

      setSelect.addEventListener("change", () => {
        populateCategories();
        populateLevels();
        refreshSetupSummary();
      });

      categorySelect.addEventListener("change", () => {
        populateLevels();
        refreshSetupSummary();
      });

      levelSelect.addEventListener("change", refreshSetupSummary);
      modeSelect.addEventListener("change", refreshSetupSummary);
      questionCountSelect.addEventListener("change", refreshSetupSummary);
    }

    function buildQuestionSetProfile() {
      const firstQuestionId = QUESTIONS[0]?.id || "";
      const firstSeriesName = SETS[0]?.seriesName || "";
      const totalQuestionCount = QUESTIONS.length;

      if (firstQuestionId.startsWith("science_textbook_")) {
        return {
          questionSetId: "school_science_jhs1_textbook_s001_s003",
          questionSetName: "理科 中1 教科書 S001-S003",
          source: "questionId",
          totalQuestionCount
        };
      }

      if (firstQuestionId.startsWith("social_geography_")) {
        return {
          questionSetId: "school_social_geography_jhs1_textbook_p10_p53",
          questionSetName: "社会 地理 p10-p53",
          source: "questionId",
          totalQuestionCount
        };
      }

      if (firstQuestionId.startsWith("h001_")) {
        return {
          questionSetId: "school_social_history_jhs1_textbook_p24_p27",
          questionSetName: "社会 歴史 p24-p27",
          source: "questionId",
          totalQuestionCount
        };
      }

      if (firstQuestionId.startsWith("japanese_test1_")) {
        return {
          questionSetId: "school_japanese_jhs1_test1",
          questionSetName: "国語 第1回定期テスト",
          source: "questionId",
          totalQuestionCount
        };
      }

      if (firstQuestionId.startsWith("english_test1_")) {
        return {
          questionSetId: "school_english_jhs1_test1",
          questionSetName: "英語 第1回定期テスト",
          source: "questionId",
          totalQuestionCount
        };
      }

      if (firstQuestionId.startsWith("math_test1_")) {
        return {
          questionSetId: "school_math_jhs1_test1",
          questionSetName: "数学 第1回定期テスト",
          source: "questionId",
          totalQuestionCount
        };
      }

      return {
        questionSetId: "unknown",
        questionSetName: firstSeriesName || "未判定の教材",
        source: firstSeriesName ? "seriesName" : "unknown",
        totalQuestionCount
      };
    }

    function renderQuestionSetProfile() {
      questionSetProfile.innerHTML =
        `<strong>教材：</strong>${escapeHtml(QUESTION_SET_PROFILE.questionSetName)}<br />` +
        `<span class="small">教材ID：${escapeHtml(QUESTION_SET_PROFILE.questionSetId)} / 問題数：${QUESTION_SET_PROFILE.totalQuestionCount}問</span>`;
    }

    function renderQuestionSetsManifestPanel() {
      const manifest = Array.isArray(window.QUESTION_SETS_MANIFEST) ? window.QUESTION_SETS_MANIFEST : [];
      const selectedQuestionSetId = loadSelectedQuestionSetId();

      if (!questionSetsManifestPanel) return;

      if (manifest.length === 0) {
        questionSetsManifestPanel.innerHTML =
          `<strong>登録教材一覧：</strong>未読み込み<br />` +
          `<span class="small">question_sets_manifest.js が読み込まれていません。</span>`;
        return;
      }

      const currentItem = manifest.find(item => item.questionSetId === QUESTION_SET_PROFILE.questionSetId);
      const selectedItem = manifest.find(item => item.questionSetId === selectedQuestionSetId);
      const selectedName = selectedItem ? selectedItem.questionSetName : "未選択";
      const currentSourceFile = currentItem ? currentItem.sourceFile : "未登録";
      const selectedSourceFile = selectedItem ? selectedItem.sourceFile : "未選択";

      const items = manifest.map(item => {
        const isCurrent = item.questionSetId === QUESTION_SET_PROFILE.questionSetId;
        const isSelected = item.questionSetId === selectedQuestionSetId;
        const marker = [
          isCurrent ? "現在読み込み中" : "登録済み",
          isSelected ? "選択中" : ""
        ].filter(Boolean).join(" / ");
        return (
          `<li>` +
          `${escapeHtml(item.questionSetName || "名称未設定")} ` +
          `<span class="small">(${escapeHtml(item.questionSetId || "ID未設定")} / ${Number(item.questionCount || 0)}問 / ${marker})</span> ` +
          `<button type="button" data-question-set-id="${escapeHtml(item.questionSetId || "")}" class="select-question-set-button">この教材を選択</button>` +
          `</li>`
        );
      }).join("");

      questionSetsManifestPanel.innerHTML =
        `<strong>登録教材一覧：</strong>${manifest.length}件<br />` +
        `<span class="small">現在読み込み中：${escapeHtml(QUESTION_SET_PROFILE.questionSetName)} / 選択中：${escapeHtml(selectedName || "未選択")}</span><br />` +
        `<span class="small">現在読み込み中sourceFile：${escapeHtml(currentSourceFile)}</span><br />` +
        `<span class="small">選択中sourceFile：${escapeHtml(selectedSourceFile)}</span><br />` +
        `<span class="small">※教材を選択すると、出題教材が自動で切り替わります。</span>` +
        `<ul style="margin: 6px 0 0 18px; padding: 0;">${items}</ul>`;

      questionSetsManifestPanel.querySelectorAll(".select-question-set-button").forEach(button => {
        button.addEventListener("click", async () => {
          await switchQuestionSet(button.dataset.questionSetId || "");
        });
      });
    }

    function renderPurposeSetsPanel() {
      if (!purposeSetsPanel) return;

      if (!window.PurposeSets || typeof window.PurposeSets.getDisplayItems !== "function") {
        purposeSetsPanel.innerHTML =
          `<strong>目的別問題集：</strong>未読み込み<br />` +
          `<span class="small">purpose_sets.js が読み込まれていません。</span>`;
        return;
      }

      const items = window.PurposeSets.getDisplayItems();

      if (items.length === 0) {
        purposeSetsPanel.innerHTML =
          `<strong>目的別問題集：</strong>未登録<br />` +
          `<span class="small">目的別問題集はまだ登録されていません。</span>`;
        return;
      }

      const displayItems = items.map((item, index) => {
        const canResolve = window.PurposeSets.canResolveWithCurrentQuestionSet(
          item.purposeSetId,
          QUESTION_SET_PROFILE.questionSetId
        );
        const isStartable = item.status === "active" && canResolve;
        const sortGroup = isStartable ? 0 : item.status === "draft" ? 1 : 2;

        return {
          ...item,
          canResolve,
          isStartable,
          originalIndex: index,
          sortGroup
        };
      }).sort((a, b) => {
        if (a.sortGroup !== b.sortGroup) return a.sortGroup - b.sortGroup;
        return a.originalIndex - b.originalIndex;
      });

      const startableCount = displayItems.filter(item => item.isStartable).length;
      const unavailableCount = displayItems.length - startableCount;
      const visibleItems = showUnavailablePurposeSets
        ? displayItems
        : displayItems.filter(item => item.isStartable);

      const listItems = visibleItems.map(item => {
        const statusLabel = item.status === "draft" ? "下書き" : item.status;
        const resolveLabel = item.canResolve ? "現在の教材で解決可能" : "現在の教材では未対応";
        const buttonLabel = item.status === "draft"
          ? "下書きのため開始不可"
          : item.canResolve
            ? "この目的別問題集を始める"
            : "現在の教材では開始不可";

        const runtimeQuestionCount = Number(item.limit || item.questionCount || 0);
        const questionSeconds = Number(item.timer?.questionSeconds || questionTimeSelect.value);
        const orderLabel = item.randomization === true || item.ordering === "random" ? "ランダム" : "固定順";
        const runtimeLabel = `設定：${runtimeQuestionCount}問 / 問題${questionSeconds}秒 / ${orderLabel}`;

        const cycle = item.isStartable ? loadPurposeCycle(item.purposeSetId) : null;
        const canAddToCycle = Boolean(cycle && cycle.status === "inProgress");
        const addToCycleLabel = canAddToCycle
          ? "この問題集の未追加問題を周回に追加"
          : "進行中の周回なし";

        return (
          `<li>` +
          `${escapeHtml(item.title)} ` +
          `<span class="small">(${escapeHtml(item.purposeSetId)} / ${runtimeQuestionCount}問 / ${escapeHtml(statusLabel || "状態不明")} / ${escapeHtml(resolveLabel)})</span><br />` +
          `<span class="small">${escapeHtml(item.description || "")}</span><br />` +
          `<span class="small">${escapeHtml(runtimeLabel)}</span><br />` +
          `<button type="button" class="btn-secondary purpose-set-start-button" ${item.isStartable ? "" : "disabled"} data-purpose-set-id="${escapeHtml(item.purposeSetId)}">${escapeHtml(buttonLabel)}</button>` +
          `${item.isStartable ? ` <button type="button" class="btn-secondary purpose-set-cycle-start-button" data-purpose-set-id="${escapeHtml(item.purposeSetId)}">周回練習を始める</button>` : ""}` +
          `${item.isStartable ? ` <button type="button" class="btn-secondary purpose-set-cycle-add-button" ${canAddToCycle ? "" : "disabled"} data-purpose-set-id="${escapeHtml(item.purposeSetId)}">${escapeHtml(addToCycleLabel)}</button>` : ""}` +
          `${item.isStartable ? `<span class="small"> ※履歴は保存します。問題別進捗にはまだ反映しません。</span>` : ""}` +
          `</li>`
        );
      }).join("");

      const unavailableToggle = unavailableCount > 0
        ? `<br /><button type="button" class="btn-secondary purpose-set-unavailable-toggle">` +
          `${showUnavailablePurposeSets ? "開始不可を隠す" : `開始不可も表示（${unavailableCount}件）`}` +
          `</button>`
        : "";

      purposeSetsPanel.innerHTML =
        `<strong>目的別問題集：</strong>${startableCount}件開始可能 / 全${items.length}件<br />` +
        `<span class="small">※目的別問題集の履歴は保存します。問題別進捗にはまだ反映しません。</span>` +
        `${unavailableToggle}` +
        `<ul style="margin: 6px 0 0 18px; padding: 0;">${listItems}</ul>`;

      purposeSetsPanel.querySelectorAll(".purpose-set-start-button").forEach(button => {
        button.addEventListener("click", () => {
          startPurposeSetQuiz(button.dataset.purposeSetId || "");
        });
      });

      purposeSetsPanel.querySelectorAll(".purpose-set-cycle-start-button").forEach(button => {
        button.addEventListener("click", () => {
          startPurposeSetCycleQuiz(button.dataset.purposeSetId || "");
        });
      });

      purposeSetsPanel.querySelectorAll(".purpose-set-cycle-add-button").forEach(button => {
        button.addEventListener("click", () => {
          addPurposeSetQuestionsToCycle(button.dataset.purposeSetId || "");
        });
      });

      const unavailableToggleButton = purposeSetsPanel.querySelector(".purpose-set-unavailable-toggle");
      if (unavailableToggleButton) {
        unavailableToggleButton.addEventListener("click", () => {
          showUnavailablePurposeSets = !showUnavailablePurposeSets;
          renderPurposeSetsPanel();
        });
      }
    }

    function startPurposeSetQuiz(purposeSetId) {
      const purposeSet = window.PurposeSets.getById(purposeSetId);

      if (!purposeSet) {
        alert("目的別問題集が見つかりません。");
        return;
      }

      const resolved = window.PurposeSets.resolveQuestionsFromCurrentSet(
        purposeSetId,
        QUESTION_SET_PROFILE.questionSetId,
        QUESTIONS
      );

      if (!resolved.ok) {
        alert("この目的別問題集は、現在読み込み中の教材では開始できません。");
        return;
      }

      const purposeQuestions = Number(purposeSet.limit || 0) > 0
        ? resolved.questions.slice(0, Number(purposeSet.limit))
        : resolved.questions;

      startQuiz(purposeQuestions, {
        mode: "purposeSet",
        id: purposeSet.purposeSetId,
        title: purposeSet.title || purposeSet.purposeSetId,
        saveProgress: false,
        saveHistory: true
      }, {
        setId: `purpose:${purposeSet.purposeSetId}`,
        setName: purposeSet.title || purposeSet.purposeSetId,
        category: purposeSet.purposeType || "目的別問題集",
        level: "目的別",
        mode: "all",
        questionCount: String(purposeQuestions.length),
        questionTimeSec: Number(purposeSet.timer?.questionSeconds || questionTimeSelect.value),
        order: purposeSet.randomization === true || purposeSet.ordering === "random" ? "random" : "normal"
      });
    }

    function startPurposeSetCycleQuiz(purposeSetId) {
      const purposeSet = window.PurposeSets.getById(purposeSetId);

      if (!purposeSet) {
        alert("目的別問題集が見つかりません。");
        return;
      }

      const resolved = window.PurposeSets.resolveQuestionsFromCurrentSet(
        purposeSetId,
        QUESTION_SET_PROFILE.questionSetId,
        QUESTIONS
      );

      if (!resolved.ok) {
        alert("この目的別問題集は、現在読み込み中の教材では開始できません。");
        return;
      }

      const purposeQuestions = Number(purposeSet.limit || 0) > 0
        ? resolved.questions.slice(0, Number(purposeSet.limit))
        : resolved.questions;

      let cycle = loadPurposeCycle(purposeSet.purposeSetId);
      let cycleQuestions = purposeQuestions;

      if (!cycle || cycle.status === "cleared") {
        cycle = createPurposeCycle(purposeSet.purposeSetId, purposeQuestions);
        savePurposeCycle(purposeSet.purposeSetId, cycle);
      } else {
        const questionMap = new Map(purposeQuestions.map(question => [question.id, question]));
        cycleQuestions = (Array.isArray(cycle.remainingQuestionRefs) ? cycle.remainingQuestionRefs : [])
          .filter(ref => ref.questionSetId === QUESTION_SET_PROFILE.questionSetId)
          .map(ref => questionMap.get(ref.questionId))
          .filter(Boolean);

        if (cycleQuestions.length === 0) {
          alert("周回練習で出題できる残り問題がありません。周回状況を確認してください。");
          return;
        }
      }

      startQuiz(cycleQuestions, {
        mode: "purposeCycle",
        id: purposeSet.purposeSetId,
        title: `${purposeSet.title || purposeSet.purposeSetId} 周回練習`,
        cycleId: cycle.cycleId || "",
        saveProgress: false,
        saveHistory: true
      }, {
        setId: `purpose-cycle:${purposeSet.purposeSetId}`,
        setName: `${purposeSet.title || purposeSet.purposeSetId} 周回練習`,
        category: purposeSet.purposeType || "目的別問題集",
        level: "周回",
        mode: "cycle",
        questionCount: String(cycleQuestions.length),
        questionTimeSec: Number(purposeSet.timer?.questionSeconds || questionTimeSelect.value),
        order: purposeSet.randomization === true || purposeSet.ordering === "random" ? "random" : "normal"
      });
    }

    async function switchQuestionSet(questionSetId) {
      if (!questionSetId || questionSetId === QUESTION_SET_PROFILE.questionSetId) {
        return;
      }

      const previousQuestionSetId = loadSelectedQuestionSetId();

      try {
        saveSelectedQuestionSetId(questionSetId);
        await loadSelectedQuestionSetData();
        rebuildStorageKeys();
        validateQuestionIds();
        populateSets();
        populateCategories();
        populateLevels();
        refreshSetupSummary();
        renderQuestionSetProfile();
        renderQuestionSetsManifestPanel();
        renderPurposeSetsPanel();
        checkStorageStatus(false);
      } catch (error) {
        console.error(error);
        if (previousQuestionSetId) {
          saveSelectedQuestionSetId(previousQuestionSetId);
        }
        alert("教材の切り替えに失敗しました。");
        renderQuestionSetsManifestPanel();
        renderPurposeSetsPanel();
      }
    }

    function getQuestionSetsManifest() {
      return Array.isArray(window.QUESTION_SETS_MANIFEST) ? window.QUESTION_SETS_MANIFEST : [];
    }

    function getSelectedQuestionSetItem() {
      const selectedQuestionSetId = loadSelectedQuestionSetId();
      if (!selectedQuestionSetId) return null;
      return getQuestionSetsManifest().find(item => item.questionSetId === selectedQuestionSetId) || null;
    }

    function getSelectedQuestionSetSourceFile() {
      const selectedItem = getSelectedQuestionSetItem();
      return selectedItem ? selectedItem.sourceFile || "" : "";
    }

    function loadSelectedQuestionSetId() {
      try { return localStorage.getItem("timedQuizTrainerSelectedQuestionSetId") || ""; }
      catch (e) { return ""; }
    }

    function saveSelectedQuestionSetId(questionSetId) {
      if (!questionSetId) return;
      try { localStorage.setItem("timedQuizTrainerSelectedQuestionSetId", questionSetId); }
      catch (e) { alert("選択中教材IDを保存できませんでした。"); }
    }

    function rebuildQuestionDataState() {
      QUESTIONS = Array.isArray(window.QUIZ_QUESTIONS) && window.QUIZ_QUESTIONS.length > 0
        ? window.QUIZ_QUESTIONS
        : SAMPLE_QUESTIONS;

      SETS = buildSetManifest();
      QUESTION_SET_PROFILE = buildQuestionSetProfile();

      return {
        questionSetId: QUESTION_SET_PROFILE.questionSetId,
        questionSetName: QUESTION_SET_PROFILE.questionSetName,
        questionCount: QUESTIONS.length,
        setCount: SETS.length
      };
    }

    function resolveQuestionDataScriptSrc(sourceFile) {
      if (sourceFile.startsWith("app/data/")) {
        return sourceFile.slice("app/".length);
      }
      return sourceFile;
    }

    function loadQuestionDataScript(sourceFile) {
      return new Promise((resolve, reject) => {
        if (!sourceFile || typeof sourceFile !== "string") {
          reject(new Error("教材JSのsourceFileが指定されていません。"));
          return;
        }

        if (!sourceFile.startsWith("app/data/") || !sourceFile.endsWith(".js")) {
          reject(new Error(`教材JSのsourceFileが不正です: ${sourceFile}`));
          return;
        }

        document.querySelectorAll('script[data-question-data-loader="true"]').forEach(script => {
          script.remove();
        });

        const script = document.createElement("script");
        script.src = resolveQuestionDataScriptSrc(sourceFile);
        script.dataset.questionDataLoader = "true";
        script.onload = () => resolve(sourceFile);
        script.onerror = () => reject(new Error(`教材JSの読み込みに失敗しました: ${sourceFile}`));
        document.head.appendChild(script);
      });
    }

    async function loadSelectedQuestionSetData() {
      const sourceFile = getSelectedQuestionSetSourceFile();

      if (!sourceFile) {
        return rebuildQuestionDataState();
      }

      await loadQuestionDataScript(sourceFile);
      return rebuildQuestionDataState();
    }

    function buildSetManifest() {
      if (Array.isArray(window.QUIZ_SETS) && window.QUIZ_SETS.length > 0) {
        return window.QUIZ_SETS
          .map(s => ({
            setId: s.setId || "unset",
            setName: s.setName || "未設定セット",
            seriesName: s.seriesName || "",
            order: Number.isFinite(Number(s.order)) ? Number(s.order) : 9999,
            description: s.description || ""
          }))
          .sort((a, b) => a.order - b.order || a.setId.localeCompare(b.setId));
      }

      const map = new Map();
      QUESTIONS.forEach(q => {
        const setId = q.setId || "unset";
        const setName = q.setName || "未設定セット";
        if (!map.has(setId)) {
          map.set(setId, {
            setId,
            setName,
            seriesName: q.seriesName || "",
            order: inferSetOrder(setId),
            description: ""
          });
        }
      });
      return Array.from(map.values()).sort((a, b) => a.order - b.order || a.setId.localeCompare(b.setId));
    }

    function inferSetOrder(setId) {
      const match = String(setId || "").match(/s(\d+)/i);
      return match ? Number(match[1]) : 9999;
    }

    function validateQuestionIds() {
      const ids = QUESTIONS.map(q => q.id);
      const duplicated = ids.filter((id, index) => ids.indexOf(id) !== index);
      if (duplicated.length > 0) {
        alert(`問題IDが重複しています：${Array.from(new Set(duplicated)).join(", ")}`);
      }
    }

    function populateSets() {
      setSelect.innerHTML = "";
      setSelect.appendChild(new Option("全部", "all"));
      SETS.forEach(set => {
        const count = QUESTIONS.filter(q => (q.setId || "unset") === set.setId).length;
        const label = `${formatSetLabel(set)}（${count}問）`;
        setSelect.appendChild(new Option(label, set.setId));
      });
    }

    function formatSetLabel(set) {
      if (set.setId === "unset") return set.setName;
      const number = set.setId.replace(/^s/i, "").padStart(3, "0");
      return `Set ${number}：${set.setName}`;
    }

    function populateCategories() {
      const targetQuestions = getQuestionsBySet(setSelect.value);
      const categories = Array.from(new Set(targetQuestions.map(q => q.category || "未設定"))).sort();
      categorySelect.innerHTML = "";
      categorySelect.appendChild(new Option("全部", "all"));
      categories.forEach(category => categorySelect.appendChild(new Option(category, category)));
    }

    function populateLevels() {
      const targetQuestions = getQuestionsBySetAndCategory(setSelect.value, categorySelect.value);
      const levels = Array.from(new Set(targetQuestions.map(q => q.level || "未設定"))).sort();
      levelSelect.innerHTML = "";
      levelSelect.appendChild(new Option("全部", "all"));
      levels.forEach(level => levelSelect.appendChild(new Option(level, level)));
    }

    function getQuestionsBySet(setId) {
      if (setId === "all") return QUESTIONS;
      return QUESTIONS.filter(q => (q.setId || "unset") === setId);
    }

    function getQuestionsBySetAndCategory(setId, category) {
      return getQuestionsBySet(setId).filter(q => {
        const qCategory = q.category || "未設定";
        return category === "all" || qCategory === category;
      });
    }

    function refreshSetupSummary() {
      updateProgressSummary();
      updateQuestionCountInfo();
    }

    function startQuiz(customQuestions = null, customRuntimeContext = null, customSettingsOverrides = null) {
      runtimeContext = customRuntimeContext || {
        mode: "questionSet",
        id: QUESTION_SET_PROFILE.questionSetId,
        title: QUESTION_SET_PROFILE.questionSetName,
        saveProgress: true,
        saveHistory: true
      };

      settings = {
        setId: setSelect.value,
        setName: getSelectedSetName(),
        category: categorySelect.value,
        level: levelSelect.value,
        mode: modeSelect.value,
        questionCount: questionCountSelect.value,
        questionTimeSec: Number(questionTimeSelect.value),
        order: orderSelect.value,
        ...(customSettingsOverrides || {})
      };

      const hasCustomQuestions = Array.isArray(customQuestions);
      let sourceQuestions = hasCustomQuestions
        ? customQuestions
        : getFilteredQuestions(settings.setId, settings.category, settings.level, settings.mode);

      if (settings.order === "random") sourceQuestions = shuffleArray(sourceQuestions);
      if (!hasCustomQuestions && settings.questionCount !== "all") sourceQuestions = sourceQuestions.slice(0, Number(settings.questionCount));

      if (sourceQuestions.length === 0) {
        alert("出題できる問題がありません。セット、カテゴリ、出題タイプ、出題モードを変更してください。");
        return;
      }

      quizQuestions = sourceQuestions;
      currentIndex = 0;
      quizStartedAt = new Date().toISOString();
      results = [];
      isPaused = false;

      showScreen("quiz");
      showQuestion();
    }

    function getSelectedSetName() {
      if (setSelect.value === "all") return "全部";
      const set = SETS.find(s => s.setId === setSelect.value);
      return set ? set.setName : "未設定セット";
    }

    function getFilteredQuestions(setId, category, level, mode = "all") {
      const isMasteryMode =
        mode === "mastery_review"
        || mode === "mastery_check";
      const masteryMap = isMasteryMode
        ? loadMasteryStates()
        : null;
      const evaluatedAt = isMasteryMode
        ? new Date().toISOString()
        : "";
      const statusPriority = {
        "要確認": 0,
        "復習推奨": 1,
        "まもなく確認": 2
      };

      const matchedItems = QUESTIONS
        .map(question => {
          const qSetId = question.setId || "unset";
          const qCategory = question.category || "未設定";
          const qLevel = question.level || "未設定";
          const matchSet = setId === "all" || qSetId === setId;
          const matchCategory =
            category === "all"
            || qCategory === category;
          const matchLevel =
            level === "all"
            || qLevel === level;

          if (!matchSet || !matchCategory || !matchLevel) {
            return null;
          }

          if (!isMasteryMode) {
            return matchProgressMode(question.id, mode)
              ? { question, evaluation: null }
              : null;
          }

          const questionSetId =
            question.questionSetId
            || QUESTION_SET_PROFILE.questionSetId
            || "unknown";
          const questionRefKey = buildMasteryQuestionRefKey(
            questionSetId,
            question.id
          );
          const state = masteryMap[questionRefKey];

          if (!state) return null;

          const evaluation = calculateMasteryReviewEvaluation(
            state,
            evaluatedAt
          );
          const targetStatuses = mode === "mastery_review"
            ? ["要確認", "復習推奨"]
            : ["要確認", "復習推奨", "まもなく確認"];

          return targetStatuses.includes(evaluation.reviewStatus)
            ? { question, evaluation }
            : null;
        })
        .filter(Boolean);

      if (isMasteryMode) {
        matchedItems.sort((a, b) => {
          const priorityDifference =
            (statusPriority[a.evaluation.reviewStatus] ?? 99)
            - (statusPriority[b.evaluation.reviewStatus] ?? 99);

          if (priorityDifference !== 0) {
            return priorityDifference;
          }

          const riskDifference =
            (b.evaluation.forgettingRisk ?? -1)
            - (a.evaluation.forgettingRisk ?? -1);

          if (riskDifference !== 0) {
            return riskDifference;
          }

          return String(a.question.id).localeCompare(
            String(b.question.id),
            "ja"
          );
        });
      }

      return matchedItems.map(item => item.question);
    }

    function matchProgressMode(questionId, mode) {
      const progress = getQuestionProgress(questionId);
      if (mode === "all") return true;
      if (mode === "new") return progress.progressStatus === "new";
      if (mode === "not_mastered") return progress.progressStatus !== "mastered";
      if (mode === "review_points") return progress.mistakePoints > 0;
      if (mode === "wrong_before") return progress.wrongCount > 0;
      return true;
    }

    function updateQuestionCountInfo() {
      const count = getFilteredQuestions(
        setSelect.value,
        categorySelect.value,
        levelSelect.value,
        modeSelect.value
      ).length;
      const requestedCount = questionCountSelect.value === "all"
        ? count
        : Number(questionCountSelect.value);
      const actualCount = Math.min(count, requestedCount);

      questionCountInfo.textContent =
        `現在の条件で ${count} 問あります。開始時は ${actualCount} 問出題します。`;
    }

    function updateProgressSummary() {
      const baseQuestions = getFilteredQuestions(setSelect.value, categorySelect.value, levelSelect.value, "all");
      const summary = summarizeProgress(baseQuestions);
      progressSummary.innerHTML = `
        <div class="summary-box"><div class="value">${summary.total}</div><div>総問題</div></div>
        <div class="summary-box status-new"><div class="value">${summary.new}</div><div>未着手</div></div>
        <div class="summary-box status-started"><div class="value">${summary.started}</div><div>着手済み</div></div>
        <div class="summary-box status-mastered"><div class="value">${summary.mastered}</div><div>習得済み</div></div>
        <div class="summary-box status-review"><div class="value">${summary.mistakePoints}</div><div>復習ポイント</div></div>
      `;
    }

    function summarizeProgress(questions) {
      const summary = { total: questions.length, new: 0, started: 0, mastered: 0, mistakePoints: 0 };
      questions.forEach(q => {
        const p = getQuestionProgress(q.id);
        if (p.progressStatus === "mastered") summary.mastered += 1;
        else if (p.seenCount > 0) summary.started += 1;
        else summary.new += 1;
        summary.mistakePoints += p.mistakePoints;
      });
      return summary;
    }

    function showQuestion() {
      clearTimer();

      const q = quizQuestions[currentIndex];
      currentQuestionStartedAt = Date.now();
      answerShownAt = null;
      answerTrigger = null;
      remainingSeconds = settings.questionTimeSec;
      isPaused = false;
      pauseStartedAt = null;
      totalPausedMs = 0;

      progressText.textContent = `第${currentIndex + 1}問 / ${quizQuestions.length}問`;
      categoryText.textContent = `${q.setName || "未設定セット"} / ${q.category || "未設定"} / ${q.level || "未設定"}`;
      questionText.textContent = q.question;
      answerText.textContent = "";
      noteText.textContent = "";
      noteText.classList.add("hidden");
      timerEl.textContent = remainingSeconds;
      timerEl.classList.remove("warning");
      pauseButton.textContent = "一時停止";
      pauseButton.disabled = false;

      questionArea.classList.remove("hidden");
      answerArea.classList.add("hidden");

      timerId = setInterval(() => {
        if (isPaused) return;
        remainingSeconds -= 1;
        timerEl.textContent = remainingSeconds;
        if (remainingSeconds <= 3) timerEl.classList.add("warning");
        if (remainingSeconds <= 0) showAnswer("timeout");
      }, 1000);
    }

    function showAnswer(trigger) {
      if (answerShownAt) return;

      clearTimer();

      if (isPaused && pauseStartedAt !== null) {
        totalPausedMs += Date.now() - pauseStartedAt;
        pauseStartedAt = null;
        isPaused = false;
      }

      answerTrigger = trigger;
      answerShownAt = Date.now();

      const q = quizQuestions[currentIndex];
      answerText.textContent = q.answer;

      if (q.note) {
        noteText.textContent = q.note;
        noteText.classList.remove("hidden");
      }

      questionArea.classList.add("hidden");
      answerArea.classList.remove("hidden");

      remainingSeconds = 0;
      timerEl.textContent = "判定";
      timerEl.classList.remove("warning");
      pauseButton.textContent = "一時停止";
      pauseButton.disabled = true;
    }

    function judgeCurrent(judgement) {
      const q = quizQuestions[currentIndex];
      const now = Date.now();
      const questionEndedAt = answerShownAt || now;
      const questionTimeMs = Math.max(
        0,
        questionEndedAt - currentQuestionStartedAt - totalPausedMs
      );

      const updatedProgress = runtimeContext.saveProgress
        ? updateQuestionProgress(q.id, judgement, now)
        : createDefaultProgress(q.id);

      results.push({
        questionSetId: q.questionSetId || QUESTION_SET_PROFILE.questionSetId || "unknown",
        questionId: q.id,
        setId: q.setId || "unset",
        setName: q.setName || "未設定セット",
        domain: q.domain || "",
        exam: q.exam || "",
        category: q.category || "未設定",
        level: q.level || "未設定",
        unit: q.unit || "",
        questionType: q.questionType || "",
        question: q.question,
        answer: q.answer,
        judgement,
        answerTrigger,
        questionTimeMs,
        mistakePointsAfter: updatedProgress.mistakePoints,
        progressStatusAfter: updatedProgress.progressStatus,
        masteryStatusAfter: updatedProgress.masteryStatus,
        judgedAt: new Date(now).toISOString()
      });

      currentIndex += 1;
      if (currentIndex >= quizQuestions.length) finishQuiz(false);
      else showQuestion();
    }

    function cloneRuntimeContext(context) {
      return {
        mode: context.mode || "questionSet",
        id: context.id || "",
        title: context.title || "",
        cycleId: context.cycleId || "",
        saveProgress: context.saveProgress !== false,
        saveHistory: context.saveHistory !== false
      };
    }

    function isPurposeSetRuntime(context) {
      return context && context.mode === "purposeSet";
    }

    function isPurposeCycleRuntime(context) {
      return context && context.mode === "purposeCycle";
    }

    function isPurposeRuntime(context) {
      return isPurposeSetRuntime(context) || isPurposeCycleRuntime(context);
    }

    function finishQuiz(interrupted) {
      clearTimer();

      const session = {
        id: `session-${Date.now()}`,
        startedAt: quizStartedAt || new Date().toISOString(),
        finishedAt: new Date().toISOString(),
        interrupted,
        settings,
        runtimeContext: cloneRuntimeContext(runtimeContext),
        results
      };

      lastSession = session;
      if (runtimeContext.saveHistory) {
        if (isPurposeRuntime(runtimeContext)) {
          savePurposeSession(session);
        } else {
          saveSession(session);
        }

        rebuildAndSaveAllMasteryStates();
      }

      if (isPurposeCycleRuntime(runtimeContext)) {
        updatePurposeCycleFromSession(session);
      }
      showResult(session);
      showScreen("result");
    }

    function showResult(session) {
      const sessionRuntimeContext = session.runtimeContext || runtimeContext;
      const isPurposeSetSession = isPurposeRuntime(sessionRuntimeContext);

      if (isPurposeSetSession) {
        resultRuntimeInfo.classList.remove("hidden");
        resultRuntimeInfo.innerHTML =
          `<strong>目的別問題集：</strong>${escapeHtml(sessionRuntimeContext.title || sessionRuntimeContext.id || "名称未設定")}<br />` +
          `<span class="small">履歴は保存しています。問題別進捗にはまだ反映していません。</span>`;
      } else {
        resultRuntimeInfo.classList.add("hidden");
        resultRuntimeInfo.innerHTML = "";
      }

      const total = session.results.length;
      const correct = session.results.filter(r => r.judgement === "correct").length;
      const wrong = session.results.filter(r => r.judgement === "wrong").length;
      const pass = session.results.filter(r => r.judgement === "pass").length;
      const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
      const avgSec = total > 0
        ? (session.results.reduce((sum, r) => sum + r.questionTimeMs, 0) / total / 1000).toFixed(1)
        : "0.0";
      const reviewPointDelta = session.results.reduce((sum, r) => {
        if (r.judgement === "wrong") return sum + 2;
        if (r.judgement === "pass") return sum + 1;
        if (r.judgement === "correct") return sum - 1;
        return sum;
      }, 0);

      resultSummary.innerHTML = `
        <div class="summary-box"><div class="value">${total}</div><div>回答数</div></div>
        <div class="summary-box"><div class="value">${correct}</div><div>正解</div></div>
        <div class="summary-box"><div class="value">${wrong}</div><div>不正解</div></div>
        <div class="summary-box"><div class="value">${pass}</div><div>パス</div></div>
        <div class="summary-box"><div class="value">${accuracy}%</div><div>正答率</div></div>
        <div class="summary-box"><div class="value">${avgSec}s</div><div>平均表示時間</div></div>
      `;

      const reviewTargets = session.results.filter(r => r.judgement !== "correct");
      retryWrongButton.disabled = reviewTargets.length === 0;

      const message = reviewPointDelta <= 0
        ? "復習ポイントを減らせました。いい流れです。"
        : "復習ポイントが見つかりました。次の復習対象です。";

      if (total === 0) {
        reviewArea.innerHTML = `<h3>復習</h3><p>回答済みの問題がありません。</p>`;
        return;
      }

      if (reviewTargets.length === 0) {
        reviewArea.innerHTML = `<h3>復習</h3><p>${message}</p><p>全問正解です。</p>`;
        return;
      }

      const items = reviewTargets.map(r => {
        const setLabel = isPurposeSetSession
          ? `${sessionRuntimeContext.title || sessionRuntimeContext.id || "目的別問題集"}（進捗未反映）`
          : (r.setName || "");

        return `
          <li>
            <strong>${escapeHtml(r.question)}</strong><br />
            答え：${escapeHtml(r.answer)}<br />
            セット：${escapeHtml(setLabel)}<br />
            判定：${labelJudgement(r.judgement)} / 表示理由：${labelTrigger(r.answerTrigger)} / 現在の復習ポイント：${r.mistakePointsAfter}
          </li>
        `;
      }).join("");

      reviewArea.innerHTML = `<h3>復習</h3><p>${message}</p><ol class="review-list">${items}</ol>`;
    }

    function updateQuestionProgress(questionId, judgement, nowMs) {
      const progressMap = loadProgressMap();
      const progress = normalizeProgress(progressMap[questionId] || createDefaultProgress(questionId));

      progress.seenCount += 1;
      progress.lastJudgement = judgement;
      progress.lastAnsweredAt = new Date(nowMs).toISOString();

      if (judgement === "correct") {
        progress.correctCount += 1;
        progress.consecutiveCorrect += 1;
        progress.mistakePoints = Math.max(0, progress.mistakePoints - 1);
      } else if (judgement === "wrong") {
        progress.wrongCount += 1;
        progress.consecutiveCorrect = 0;
        progress.mistakePoints += 2;
      } else if (judgement === "pass") {
        progress.passCount += 1;
        progress.consecutiveCorrect = 0;
        progress.mistakePoints += 1;
      }

      applyStatus(progress, questionId);
      progressMap[questionId] = progress;
      saveProgressMap(progressMap);
      checkStorageStatus(false);
      return progress;
    }

    function applyStatus(progress, questionId) {
      if (progress.seenCount === 0) {
        progress.progressStatus = "new";
        progress.masteryStatus = "new";
        return;
      }

      const q = getQuestionById(questionId);
      const requiredCorrect = getRequiredConsecutiveCorrect(q);
      const mastered = progress.mistakePoints === 0 && progress.consecutiveCorrect >= requiredCorrect;

      if (mastered) {
        progress.progressStatus = "mastered";
        progress.masteryStatus = "mastered";
      } else {
        progress.progressStatus = "started";
        progress.masteryStatus = progress.mistakePoints > 0 ? "review" : "learning";
      }
    }

    function getRequiredConsecutiveCorrect(q) {
      const type = q?.questionType || "";
      if (type === "read") return 2;
      return 3;
    }

    function createDefaultProgress(questionId) {
      return {
        questionId,
        seenCount: 0,
        correctCount: 0,
        wrongCount: 0,
        passCount: 0,
        consecutiveCorrect: 0,
        mistakePoints: 0,
        progressStatus: "new",
        masteryStatus: "new",
        lastJudgement: "",
        lastAnsweredAt: ""
      };
    }

    function normalizeProgress(progress) {
      const normalized = { ...createDefaultProgress(progress.questionId), ...progress };
      if (normalized.mistakePoints === undefined || normalized.mistakePoints === null) {
        normalized.mistakePoints = (normalized.wrongCount || 0) * 2 + (normalized.passCount || 0);
      }
      if (!normalized.progressStatus) {
        normalized.progressStatus = normalized.seenCount > 0 ? "started" : "new";
      }
      if (normalized.masteryStatus === "mastered") {
        normalized.progressStatus = "mastered";
      }
      return normalized;
    }

    function getQuestionProgress(questionId) {
      const progressMap = loadProgressMap();
      const progress = normalizeProgress(progressMap[questionId] || createDefaultProgress(questionId));
      applyStatus(progress, questionId);
      return progress;
    }

    function loadProgressMap() {
      try { return JSON.parse(localStorage.getItem(PROGRESS_KEY)) || {}; }
      catch (e) { return {}; }
    }

    function saveProgressMap(progressMap) {

    }

    function showMasteryList() {
      const masteryMap = loadMasteryStates();
      const evaluatedAt = new Date().toISOString();
      const statusPriority = {
        "要確認": 0,
        "復習推奨": 1,
        "まもなく確認": 2,
        "安定": 3,
        "未確認": 4
      };

      const rows = QUESTIONS
        .map(question => {
          const questionSetId =
            question.questionSetId
            || QUESTION_SET_PROFILE.questionSetId
            || "unknown";
          const questionRefKey = buildMasteryQuestionRefKey(
            questionSetId,
            question.id
          );
          const state = masteryMap[questionRefKey];

          if (!state) return null;

          return {
            question,
            state,
            evaluation: calculateMasteryReviewEvaluation(
              state,
              evaluatedAt
            )
          };
        })
        .filter(Boolean)
        .sort((a, b) => {
          const priorityDifference =
            (statusPriority[a.evaluation.reviewStatus] ?? 99)
            - (statusPriority[b.evaluation.reviewStatus] ?? 99);

          if (priorityDifference !== 0) return priorityDifference;

          const riskDifference =
            (b.evaluation.forgettingRisk ?? -1)
            - (a.evaluation.forgettingRisk ?? -1);

          if (riskDifference !== 0) return riskDifference;

          return String(a.question.id).localeCompare(
            String(b.question.id),
            "ja"
          );
        });

      if (rows.length === 0) {
        masteryListArea.innerHTML =
          `<p>現在の教材には、表示できる定着状態がまだありません。</p>`;
        showScreen("masteryList");
        return;
      }

      const body = rows.map(({ question, state, evaluation }) => {
        const elapsedDays = Number.isFinite(evaluation.elapsedDays)
          ? evaluation.elapsedDays.toFixed(1)
          : "-";
        const forgettingRisk = Number.isFinite(evaluation.forgettingRisk)
          ? `${Math.round(evaluation.forgettingRisk * 100)}%`
          : "-";
        const nextReviewAt = parseMasteryDate(state.nextReviewAt);
        const nextReviewText = nextReviewAt
          ? nextReviewAt.toLocaleDateString("ja-JP")
          : "-";

        return `
          <tr>
            <td>${escapeHtml(evaluation.reviewStatus)}</td>
            <td>${state.currentStabilityLevel}</td>
            <td>${state.highestStabilityLevel}</td>
            <td>${elapsedDays}</td>
            <td>${forgettingRisk}</td>
            <td>${escapeHtml(nextReviewText)}</td>
            <td>${escapeHtml(question.id)}</td>
            <td>${escapeHtml(question.question || "")}</td>
          </tr>
        `;
      }).join("");

      masteryListArea.innerHTML = `

        </p>

                <th>次回確認</th>
                <th>問題ID</th>
                <th>問題</th>
              </tr>
            </thead>
            <tbody>${body}</tbody>
          </table>
        </div>
      `;

      showScreen("masteryList");
    }

    function loadHistory() {

    function loadPurposeHistory(purposeSetId) {

    function buildQuestionRef(question) {
      return {
        questionSetId: QUESTION_SET_PROFILE.questionSetId || "",
        questionId: question?.id || ""
      };
    }

    function createPurposeCycle(purposeSetId, questions) {
      const now = new Date().toISOString();
      const questionRefs = (Array.isArray(questions) ? questions : [])
        .map(buildQuestionRef)
        .filter(ref => ref.questionSetId && ref.questionId);

      return {
        purposeSetId,
        cycleId: `cycle-${Date.now()}`,
        startedAt: now,
        updatedAt: now,
        status: "inProgress",
        initialQuestionRefs: questionRefs,
        addedQuestionRefs: [],
        remainingQuestionRefs: [...questionRefs],
        clearedQuestionRefs: [],
        addEvents: [],
        lastSessionId: null
      };
    }

    function buildQuestionRefKey(ref) {
      return `${ref?.questionSetId || ""}::${ref?.questionId || ""}`;
    }

    function uniqueQuestionRefs(refs) {
      const seen = new Set();
      return (Array.isArray(refs) ? refs : []).filter(ref => {
        const key = buildQuestionRefKey(ref);
        if (!ref?.questionSetId || !ref?.questionId || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function buildQuestionRefFromResult(result) {
      return {
        questionSetId:
          result?.questionSetId ||
          QUESTION_SET_PROFILE.questionSetId ||
          "",
        questionId: result?.questionId || ""
      };
    }

    function updatePurposeCycleFromSession(session) {
      const sessionRuntimeContext = session.runtimeContext || {};
      const purposeSetId = sessionRuntimeContext.id || "";
      const cycle = loadPurposeCycle(purposeSetId);
      if (!purposeSetId || !cycle) return;

      const sessionCycleId = sessionRuntimeContext.cycleId || "";
      if (sessionCycleId && sessionCycleId !== cycle.cycleId) return;

      const resultRefs = (Array.isArray(session.results) ? session.results : [])
        .map(buildQuestionRefFromResult)
        .filter(ref => ref.questionSetId && ref.questionId);

      const answeredKeys = new Set(resultRefs.map(buildQuestionRefKey));
      const previousRemaining = Array.isArray(cycle.remainingQuestionRefs)
        ? cycle.remainingQuestionRefs
        : [];

      const notAnsweredRemaining = previousRemaining.filter(ref => !answeredKeys.has(buildQuestionRefKey(ref)));

      const notClearedRefs = (Array.isArray(session.results) ? session.results : [])
        .filter(result => result.judgement !== "correct")
        .map(buildQuestionRefFromResult)
        .filter(ref => ref.questionSetId && ref.questionId);

      const correctRefs = (Array.isArray(session.results) ? session.results : [])
        .filter(result => result.judgement === "correct")
        .map(buildQuestionRefFromResult)
        .filter(ref => ref.questionSetId && ref.questionId);

      const nextRemaining = uniqueQuestionRefs([...notAnsweredRemaining, ...notClearedRefs]);
      const remainingKeys = new Set(nextRemaining.map(buildQuestionRefKey));
      const nextCleared = uniqueQuestionRefs([
        ...(Array.isArray(cycle.clearedQuestionRefs) ? cycle.clearedQuestionRefs : []),
        ...correctRefs
      ]).filter(ref => !remainingKeys.has(buildQuestionRefKey(ref)));

      savePurposeCycle(purposeSetId, {
        ...cycle,
        updatedAt: new Date().toISOString(),
        status: nextRemaining.length === 0 ? "cleared" : "inProgress",
        remainingQuestionRefs: nextRemaining,
        clearedQuestionRefs: nextCleared,
        lastSessionId: session.id
      });
    }

    function addPurposeSetQuestionsToCycle(purposeSetId) {
      const purposeSet = window.PurposeSets.getById(purposeSetId);

      if (!purposeSet) {
        alert("目的別問題集が見つかりません。");
        return;
      }

      const cycle = loadPurposeCycle(purposeSet.purposeSetId);
      if (!cycle || cycle.status !== "inProgress") {
        alert("進行中の周回がありません。先に周回練習を開始してください。");
        return;
      }

      const resolved = window.PurposeSets.resolveQuestionsFromCurrentSet(
        purposeSetId,
        QUESTION_SET_PROFILE.questionSetId,
        QUESTIONS
      );

      if (!resolved.ok) {
        alert("この目的別問題集は、現在読み込み中の教材では解決できません。");
        return;
      }

      const purposeQuestions = Number(purposeSet.limit || 0) > 0
        ? resolved.questions.slice(0, Number(purposeSet.limit))
        : resolved.questions;

      const existingKeys = new Set([
        ...(Array.isArray(cycle.initialQuestionRefs) ? cycle.initialQuestionRefs : []),
        ...(Array.isArray(cycle.addedQuestionRefs) ? cycle.addedQuestionRefs : []),
        ...(Array.isArray(cycle.remainingQuestionRefs) ? cycle.remainingQuestionRefs : []),
        ...(Array.isArray(cycle.clearedQuestionRefs) ? cycle.clearedQuestionRefs : [])
      ].map(buildQuestionRefKey));

      const refsToAdd = uniqueQuestionRefs(
        purposeQuestions
          .map(buildQuestionRef)
          .filter(ref => ref.questionSetId && ref.questionId)
          .filter(ref => !existingKeys.has(buildQuestionRefKey(ref)))
      );

      if (refsToAdd.length === 0) {
        alert("追加できる未登録の問題はありません。");
        return;
      }

      const now = new Date().toISOString();
      const nextCycle = {
        ...cycle,
        updatedAt: now,
        status: "inProgress",
        addedQuestionRefs: uniqueQuestionRefs([
          ...(Array.isArray(cycle.addedQuestionRefs) ? cycle.addedQuestionRefs : []),
          ...refsToAdd
        ]),
        remainingQuestionRefs: uniqueQuestionRefs([
          ...(Array.isArray(cycle.remainingQuestionRefs) ? cycle.remainingQuestionRefs : []),
          ...refsToAdd
        ]),
        addEvents: [
          ...(Array.isArray(cycle.addEvents) ? cycle.addEvents : []),
          {
            addedAt: now,
            reason: "manual_add_from_purpose_set",
            questionRefs: refsToAdd
          }
        ]
      };

      savePurposeCycle(purposeSet.purposeSetId, nextCycle);
      renderPurposeSetsPanel();
      alert(`${refsToAdd.length}問を進行中の周回に追加しました。`);
    }

    function getPurposeHistorySummary() {
      const purposeHistories = loadAllPurposeHistories();
      const keys = Object.keys(purposeHistories);
      const sessionCount = Object.values(purposeHistories).reduce(
        (sum, sessions) => sum + (Array.isArray(sessions) ? sessions.length : 0),
        0
      );

      return { keyCount: keys.length, sessionCount };
    }

    function formatPurposeHistoryDetails() {
      const purposeHistories = loadAllPurposeHistories();
      const purposeSetMap = new Map(
        (Array.isArray(window.PURPOSE_SETS_MANIFEST) ? window.PURPOSE_SETS_MANIFEST : []).map(purposeSet => [
          purposeSet.purposeSetId,
          purposeSet.title || purposeSet.purposeSetId
        ])
      );

      const lines = Object.entries(purposeHistories)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([purposeSetId, sessions]) => {
          const title = purposeSetMap.get(purposeSetId) || purposeSetId;
          const count = Array.isArray(sessions) ? sessions.length : 0;
          return `  - ${title}: ${count} セッション`;
        });

      return lines.length > 0 ? `\n目的別問題集履歴内訳：\n${lines.join("\n")}` : "";
    }

    function loadAllPurposeHistories() {
      const prefix = `${PURPOSE_HISTORY_KEY_BASE}__`;
      const purposeHistories = {};

      try {
        for (let i = 0; i < localStorage.length; i += 1) {
          const key = localStorage.key(i);
          if (!key || !key.startsWith(prefix)) continue;

          const purposeSetId = key.slice(prefix.length);
          try {
            const sessions = JSON.parse(localStorage.getItem(key)) || [];
            purposeHistories[purposeSetId] = Array.isArray(sessions) ? sessions : [];
          } catch (e) {
            purposeHistories[purposeSetId] = [];
          }
        }
      } catch (e) {
        return {};
      }

      return purposeHistories;
    }

    function clearAllPurposeHistories() {
      const prefix = `${PURPOSE_HISTORY_KEY_BASE}__`;
      const keys = [];

      for (let i = 0; i < localStorage.length; i += 1) {
        const key = localStorage.key(i);
        if (key && key.startsWith(prefix)) keys.push(key);
      }

      keys.forEach(key => localStorage.removeItem(key));
    }

    function restorePurposeHistories(purposeHistories) {
      if (!purposeHistories || typeof purposeHistories !== "object" || Array.isArray(purposeHistories)) return;

      clearAllPurposeHistories();

      Object.entries(purposeHistories).forEach(([purposeSetId, sessions]) => {
        if (!purposeSetId || !Array.isArray(sessions)) return;
        localStorage.setItem(buildPurposeHistoryKey(purposeSetId), JSON.stringify(sessions));
      });
    }

    function restorePurposeCycles(purposeCycles) {
      if (!purposeCycles || typeof purposeCycles !== "object" || Array.isArray(purposeCycles)) return;

      clearAllPurposeCycles();

      Object.entries(purposeCycles).forEach(([purposeSetId, cycle]) => {
        if (!purposeSetId || !cycle || typeof cycle !== "object" || Array.isArray(cycle)) return;
        localStorage.setItem(buildPurposeCycleKey(purposeSetId), JSON.stringify(cycle));
      });
    }

    function importBackupJson(event) {
      const file = event.target.files?.[0];
      event.target.value = "";
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const backup = JSON.parse(String(reader.result || "{}"));
          validateBackup(backup);

          if (backup.questionSetId && backup.questionSetId !== QUESTION_SET_PROFILE.questionSetId) {
            const proceed = confirm(
              `教材が一致しないバックアップです。\n\n` +
              `現在の教材：${QUESTION_SET_PROFILE.questionSetName}\n` +
              `現在の教材ID：${QUESTION_SET_PROFILE.questionSetId}\n\n` +
              `バックアップの教材：${backup.questionSetName || "不明"}\n` +
              `バックアップの教材ID：${backup.questionSetId}\n\n` +
              `このまま読み込むと、現在の履歴・進捗が別教材の内容で上書きされる可能性があります。\n` +
              `続行しますか？`
            );
            if (!proceed) return;
          }

          const historyCount = Array.isArray(backup.history) ? backup.history.length : 0;
          const progressCount = backup.progress && typeof backup.progress === "object" ? Object.keys(backup.progress).length : 0;
          const hasPurposeHistories = backup.purposeHistories && typeof backup.purposeHistories === "object";
          const purposeHistoryCount = hasPurposeHistories
            ? Object.values(backup.purposeHistories).reduce((sum, sessions) => sum + (Array.isArray(sessions) ? sessions.length : 0), 0)
            : 0;
          const purposeHistorySetCount = hasPurposeHistories
            ? Object.keys(backup.purposeHistories).length
            : 0;
          const purposeHistoryImportMessage = hasPurposeHistories
            ? `目的別問題集履歴：${purposeHistoryCount} セッション（${purposeHistorySetCount} 件）\n`
            : `目的別問題集履歴：旧形式バックアップのため変更しません\n`;
          const hasPurposeCycles = backup.purposeCycles && typeof backup.purposeCycles === "object";
          const purposeCycleCount = hasPurposeCycles
            ? Object.keys(backup.purposeCycles).length
            : 0;
          const purposeCycleImportMessage = hasPurposeCycles
            ? `周回状況：${purposeCycleCount} 件\n`
            : `周回状況：旧形式バックアップのため変更しません\n`;
          const overwriteTargets = [
            "現在の履歴",
            "進捗",
            ...(hasPurposeHistories ? ["目的別問題集履歴"] : []),
            ...(hasPurposeCycles ? ["周回状況"] : [])
          ];
          const keepTargets = [
            ...(!hasPurposeHistories ? ["目的別問題集履歴"] : []),
            ...(!hasPurposeCycles ? ["周回状況"] : [])
          ];
          const overwriteMessage = keepTargets.length === 0
            ? `${overwriteTargets.join("・")}は上書きされます。`
            : `${overwriteTargets.join("・")}は上書きされます。${keepTargets.join("・")}は変更しません。`;
          const ok = confirm(
            `バックアップを読み込みますか？\n\n` +
            `出力日時：${backup.exportedAt || "不明"}\n` +
            `教材：${backup.questionSetName || "旧形式または不明"}\n` +
            `教材ID：${backup.questionSetId || "旧形式または不明"}\n` +
            `通常教材履歴：${historyCount} セッション\n` +
            purposeHistoryImportMessage +
            purposeCycleImportMessage +
            `進捗：${progressCount} 問分\n\n` +
            overwriteMessage
          );
          if (!ok) return;

          localStorage.setItem(HISTORY_KEY, JSON.stringify(backup.history || []));
          localStorage.setItem(PROGRESS_KEY, JSON.stringify(backup.progress || {}));
          restorePurposeHistories(backup.purposeHistories);
          restorePurposeCycles(backup.purposeCycles);
          refreshSetupSummary();
          checkStorageStatus(false);
          alert("バックアップJSONから復元しました。");
        } catch (e) {
          alert(`バックアップJSONの読み込みに失敗しました。\n${e.message}`);
        }
      };
      reader.readAsText(file, "utf-8");
    }

    function validateBackup(backup) {
      if (!backup || typeof backup !== "object") throw new Error("JSON形式が正しくありません。");
      if (backup.appName !== "timed-quiz-trainer") throw new Error("このアプリのバックアップJSONではありません。");
      if (!Array.isArray(backup.history)) throw new Error("history が配列ではありません。");
      if (!backup.progress || typeof backup.progress !== "object" || Array.isArray(backup.progress)) {
        throw new Error("progress がオブジェクトではありません。");
      }
      if (backup.purposeHistories !== undefined &&
          (!backup.purposeHistories || typeof backup.purposeHistories !== "object" || Array.isArray(backup.purposeHistories))) {
        throw new Error("purposeHistories がオブジェクトではありません。");
      }
      if (backup.purposeCycles !== undefined &&
          (!backup.purposeCycles || typeof backup.purposeCycles !== "object" || Array.isArray(backup.purposeCycles))) {
        throw new Error("purposeCycles がオブジェクトではありません。");
      }
    }
